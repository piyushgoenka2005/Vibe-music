
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin  | Vibe Music Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-admin: #1a1a1a;
            --accent-blue: #007bff;
            --bg-body: #f4f7f6;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: #fff;
            width: 100%;
            max-width: 400px;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        .logo-text {
            font-size: 32px; font-weight: 900; color: #005cb9;
            letter-spacing: -1.5px; margin-bottom: 10px;
        }
        .card-header h2 { font-size: 18px; font-weight: 700; color: #555; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        
        .form-group { text-align: left; margin-bottom: 25px; }
        .form-group label { display: block; font-size: 12px; font-weight: 800; color: #777; margin-bottom: 8px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 8px; font-size: 15px; outline: none; transition: border-color .2s; }
        .form-control:focus { border-color: var(--accent-blue); }
        
        .login-btn { width: 100%; padding: 16px; background: var(--primary-admin); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform .2s; }
        .login-btn:hover { transform: translateY(-2px); background: #000; }
        
        .alert { padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-text">Vibe<span style="color:#d71920;">Music</span></div>
        <div class="card-header">
            <h2>Management Login</h2>
        </div>

        

        <form method="POST">
            <input type="hidden" name="csrfmiddlewaretoken" value="OayYxj0kfLNYclkJFMIWGq7x7fznADSlzQ3FjnqQYKSr6KkcddS6pkvAruD6gqEF">
            <div class="form-group">
                <label>Administrator Username</label>
                <input type="text" name="username" class="form-control" placeholder="admin_username" required autofocus>
            </div>
            <div class="form-group">
                <label>Secure Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Secure Login</button>
        </form>
        
        <div style="margin-top: 30px;">
            <a href="/user/" style="font-size: 13px; color: #888; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Storefront</a>
        </div>
    </div>
</body>
</html>
